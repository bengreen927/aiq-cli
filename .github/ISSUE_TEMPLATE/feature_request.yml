name: Feature Request
description: Suggest a feature for AIQ
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - "Phase 1: Core"
        - "Phase 2: Distribution"
        - "Phase 3: Platform"
        - "Phase 4: Growth"
